worker_processes  auto;

events {
    worker_connections  10000;
}

http {
    server {
        listen 80;
        server_name localhost;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate /certs/localhost.pem;
        ssl_certificate_key /certs/localhost-key.pem;

        proxy_http_version 1.1;

        add_header Access-Control-Allow-Origin https://localhost always;

        location /game/init {
            proxy_pass http://state-server:4444;
        }

        location /api/v1 {
            proxy_pass http://backend:8080;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /ws/chat {
            proxy_pass http://backend:5555;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        location /ws/view {
            proxy_pass http://view-server:8000;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        location /ws/game/0 {
            proxy_pass http://game-server:8000;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        location / {
            proxy_pass http://game-client:443;
        }
    }
}
