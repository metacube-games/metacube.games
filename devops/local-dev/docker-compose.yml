volumes:

  certificates:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./certificates

  environment:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./config/environment

  state-world-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./state/world-data

  state-users-db:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./state/users-db

  state-backend:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./state/backend


networks:

  dev-network:
    driver: bridge

services:

  controller-backend:
    container_name: controller-backend
    build: ./controller/backend
    ports:
      - "10000:10000"
    volumes:
      # DO NOT MOUNT otherwise the vendor folder will be discarded
      # Mount only when debugging
      # - ./controller/backend:/app
      - certificates:/certs:ro
      - environment:/env:ro
      # Mount Docker socket to communicate with other containers
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - dev-network
    working_dir: /app
    tty: true
    stdin_open: true
    restart: unless-stopped

  controller-frontend:
    container_name: controller-frontend
    build: ./controller/frontend
    ports:
      - "3000:3000"
    volumes:
      # DO NOT MOUNT otherwise the node_modules folder will be discarded
      # Mount only when debugging
      # - ./controller/frontend:/app
      - certificates:/certs:ro
      - environment:/env:ro
    networks:
      - dev-network
    working_dir: /app
    tty: true
    stdin_open: true
    restart: unless-stopped

  game-db:
    container_name: game-db
    image: eqalpha/keydb
    volumes:
      - ./config/game-db/keydb.conf:/etc/keydb/keydb.conf
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "keydb-cli -a \"$(awk '/^requirepass/{print $2; exit}' /etc/keydb/keydb.conf)\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    tty: true
    stdin_open: true
    restart: unless-stopped

  db-init:
    container_name: db-init
    build: ../../game/db-init
    volumes:
      - ../../game/db-init:/app
      - environment:/env:ro
      - state-world-data:/world-data
    networks:
      - dev-network
    working_dir: /app
    tty: true
    stdin_open: true
    restart: unless-stopped

  users-db:
    container_name: users-db
    image: mysql
    environment:
      - MYSQL_ALLOW_EMPTY_PASSWORD=yes
    volumes:
      - state-users-db:/var/lib/mysql
      - ./config/users-db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - dev-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    tty: true
    stdin_open: true
    restart: unless-stopped

  cache-db:
    container_name: cache-db
    image: eqalpha/keydb
    volumes:
      - ./config/cache-db/keydb.conf:/etc/keydb/keydb.conf
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "keydb-cli -a \"$(awk '/^requirepass/{print $2; exit}' /etc/keydb/keydb.conf)\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    tty: true
    stdin_open: true
    restart: unless-stopped

  backend:
    container_name: backend
    image: golang:1.26
    environment:
      - GIN_MODE=release
    volumes:
      - ../../game/backend:/app
      - certificates:/certs:ro
      - environment:/env:ro
      - state-backend:/persistent
    networks:
      - dev-network
    depends_on:
      users-db:
        condition: service_healthy
      cache-db:
        condition: service_healthy
      game-db:
        condition: service_healthy
    working_dir: /app
    tty: true
    stdin_open: true
    restart: unless-stopped

  game-server:
    container_name: game-server
    image: server-view-state
    environment:
      - WITH_BORINGSSL=1
    volumes:
      - ../../game/server-view-state:/app
      - certificates:/certs:ro
      - environment:/env:ro
    networks:
      - dev-network
    working_dir: /app
    tty: true
    stdin_open: true
    restart: unless-stopped

  view-server:
    container_name: view-server
    image: server-view-state
    environment:
      - WITH_BORINGSSL=1
    volumes:
      - ../../game/server-view-state:/app
      - certificates:/certs:ro
      - environment:/env:ro
    networks:
      - dev-network
    working_dir: /app
    tty: true
    stdin_open: true
    restart: unless-stopped

  state-server:
    container_name: state-server
    image: server-view-state
    environment:
      - WITH_BORINGSSL=1
    volumes:
      - ../../game/server-view-state:/app
      - certificates:/certs:ro
      - environment:/env:ro
      - state-world-data:/world-data
    networks:
      - dev-network
    working_dir: /app
    tty: true
    stdin_open: true
    restart: unless-stopped

  game-client:
    container_name: game-client
    build: ../../game/client
    volumes:
      - ../../game/client:/app
      - certificates:/certs:ro
      - environment:/env:ro
    networks:
      - dev-network
    working_dir: /app
    tty: true
    stdin_open: true
    restart: unless-stopped

  backend-proxy:
    container_name: backend-proxy
    image: nginx:latest
    volumes:
      - ./config/environment/nginx.conf:/etc/nginx/nginx.conf:ro
      - certificates:/certs:ro
    ports:
      - 80:80
      - 443:443
    networks:
      - dev-network
    restart: unless-stopped
