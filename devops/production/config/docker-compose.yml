networks:
  # frontend: nginx + all services nginx proxies to.
  # Services on this network only cannot reach any DB/storage container.
  frontend:
    driver: bridge

  # internal: DB/storage containers + services that need DB access.
  # Never directly reachable by pure frontend services (landing, market, etc).
  internal:
    driver: bridge
    internal: true

volumes:
  environment:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./config/environment

  world-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./world-data

services:

  # ============================================================
  # INFRASTRUCTURE — always up, never stopped by stop.yml
  # ============================================================

  nginx:
    container_name: nginx
    image: nginx:alpine
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/certificates:/certs:ro
      - ./assets:/assets:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - frontend
    restart: unless-stopped

  cache-db:
    container_name: cache-db
    image: eqalpha/keydb
    volumes:
      - ./config/cache-db/keydb.conf:/etc/keydb/keydb.conf
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "keydb-cli -a \"$(awk '/^requirepass/{print $2; exit}' /etc/keydb/keydb.conf)\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  private-keys:
    container_name: private-keys
    image: nginx:alpine
    user: "1000:1000"
    volumes:
      - ./config/private-keys/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./private:/data:ro
    networks:
      - internal
    restart: unless-stopped

  # users-db is always up — required by link-wallet and backend.
  # Never stopped by stop.yml.
  users-db:
    container_name: users-db
    image: mysql:8
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./config/users-db/dump.sql:/docker-entrypoint-initdb.d/dump.sql:ro
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: mysqladmin ping -h localhost -u root --password=$$MYSQL_ROOT_PASSWORD
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ============================================================
  # INDEPENDENT SERVICES — always up, auto-deployed via CI
  # ============================================================

  landing-page:
    container_name: landing-page
    image: ghcr.io/metacube-games/metacube-landing-page:latest
    networks:
      - frontend
    restart: unless-stopped

  market:
    container_name: market
    image: ghcr.io/metacube-games/metacube-market:latest
    networks:
      - frontend
    restart: unless-stopped

  link-wallet:
    container_name: link-wallet
    image: ghcr.io/metacube-games/metacube-link-wallet:latest
    depends_on:
      users-db:
        condition: service_healthy
    networks:
      - frontend
      - internal
    restart: unless-stopped

  indexer:
    container_name: indexer
    image: ghcr.io/metacube-games/metacube-indexer:latest
    environment:
      - API_URL=${INDEXER_STARKNET_RPC_URL}
    volumes:
      - ./data/indexer:/persistent
    networks:
      - frontend
    restart: unless-stopped

  signatures:
    container_name: signatures
    image: ghcr.io/metacube-games/metacube-signatures:latest
    networks:
      - frontend
    restart: unless-stopped

  # ============================================================
  # GAME CLUSTER — started/stopped manually via Ansible
  # db-init is one-shot (restart: "no")
  # all others use restart: unless-stopped for crash recovery
  # on server reboot game-db loads persisted RDB from ./data/game-db
  # ============================================================

  game-db:
    container_name: game-db
    image: eqalpha/keydb
    volumes:
      - ./config/game-db/keydb.conf:/etc/keydb/keydb.conf
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "keydb-cli -a \"$(awk '/^requirepass/{print $2; exit}' /etc/keydb/keydb.conf)\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  db-init:
    container_name: db-init
    image: ghcr.io/metacube-games/metacube-db-init:latest
    depends_on:
      game-db:
        condition: service_healthy
    volumes:
      - environment:/env:ro
      - world-data:/world-data
    networks:
      - internal
    restart: "no"

  backend:
    container_name: backend
    image: ghcr.io/metacube-games/metacube-backend:latest
    depends_on:
      game-db:
        condition: service_healthy
      users-db:
        condition: service_healthy
      cache-db:
        condition: service_healthy
    environment:
      - GIN_MODE=release
    volumes:
      - environment:/env:ro
      - ./logs:/logs
      - ./data/backend:/persistent
    networks:
      - frontend
      - internal
    restart: unless-stopped

  state-server:
    container_name: state-server
    image: ghcr.io/metacube-games/metacube-state-server:latest
    depends_on:
      game-db:
        condition: service_healthy
    volumes:
      - environment:/env:ro
      - world-data:/world-data
    networks:
      - frontend
      - internal
    restart: unless-stopped

  game-server:
    container_name: game-server
    image: ghcr.io/metacube-games/metacube-game-server:latest
    depends_on:
      game-db:
        condition: service_healthy
    environment:
      - GAME_SERVER_ID=0
    volumes:
      - environment:/env:ro
    networks:
      - frontend
      - internal
    restart: unless-stopped

  view-server:
    container_name: view-server
    image: ghcr.io/metacube-games/metacube-view-server:latest
    depends_on:
      game-db:
        condition: service_healthy
    volumes:
      - environment:/env:ro
    networks:
      - frontend
      - internal
    restart: unless-stopped

  game-client:
    container_name: game-client
    image: ghcr.io/metacube-games/metacube-game-client:latest
    depends_on:
      backend:
        condition: service_started
      game-server:
        condition: service_started
      view-server:
        condition: service_started
      state-server:
        condition: service_started
    networks:
      - frontend
    restart: unless-stopped
