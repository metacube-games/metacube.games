worker_processes auto;

events {
    worker_connections 10000;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;
    sendfile on;

    # Only allow traffic from Cloudflare IPs (Full Strict mode)
    geo $cloudflare_ip {
        default 0;
        # IPv4
        103.21.244.0/22  1;
        103.22.200.0/22  1;
        103.31.4.0/22    1;
        104.16.0.0/13    1;
        104.24.0.0/14    1;
        108.162.192.0/18 1;
        131.0.72.0/22    1;
        141.101.64.0/18  1;
        162.158.0.0/15   1;
        172.64.0.0/13    1;
        173.245.48.0/20  1;
        188.114.96.0/20  1;
        190.93.240.0/20  1;
        197.234.240.0/22 1;
        198.41.128.0/17  1;
        # IPv6
        2400:cb00::/32   1;
        2606:4700::/32   1;
        2803:f800::/32   1;
        2405:b500::/32   1;
        2405:8100::/32   1;
        2a06:98c0::/29   1;
        2c0f:f248::/32   1;
    }

    # Tell nginx which IPs are trusted to set CF-Connecting-IP so that
    # $remote_addr (used by access logs, rate limits, geo blocks, etc.)
    # reflects the real client IP instead of the Cloudflare edge IP.
    # Mirrors the geo block above; keep them in sync via refresh-cf-ips.sh.
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    # Use Docker's internal DNS so upstream hostnames resolve at request time,
    # not at startup — allows nginx to start even when game cluster is down.
    resolver 127.0.0.11 valid=30s;

    map $http_origin $cors_origin {
        default                             "";
        "https://market.metacube.games"     "https://market.metacube.games";
        "https://play.metacube.games"       "https://play.metacube.games";
        "https://link.metacube.games"       "https://link.metacube.games";
        # For local dev
        "http://localhost:3000"             "http://localhost:3000";
        "http://localhost:3001"             "http://localhost:3001";
        "http://localhost:3002"             "http://localhost:3002";
    }

    # HTTP → HTTPS redirect for all domains
    server {
        listen 80 default_server;
        server_name _;

        if ($cloudflare_ip = 0) { return 403; }

        return 301 https://$host$request_uri;
    }

    # ----------------------------------------------------------------
    # metacube.games — landing page
    # ----------------------------------------------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name metacube.games;

        if ($cloudflare_ip = 0) { return 403; }

        ssl_certificate     /certs/metacube.pem;
        ssl_certificate_key /certs/metacube.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://landing-page:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
        }
    }

    # ----------------------------------------------------------------
    # play.metacube.games — game client + backend + websockets
    # ----------------------------------------------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name play.metacube.games;

        if ($cloudflare_ip = 0) { return 403; }

        ssl_certificate     /certs/metacube.pem;
        ssl_certificate_key /certs/metacube.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        proxy_http_version 1.1;
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Vary Origin always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

        set $upstream_state_server  state-server;
        set $upstream_backend       backend;
        set $upstream_view_server   view-server;
        set $upstream_game_server   game-server;
        set $upstream_game_client   game-client;

        location /game/init {
            proxy_pass http://$upstream_state_server:4444;
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        }

        location /api/v1 {
            proxy_pass http://$upstream_backend:8080;
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        }

        location /ws/chat {
            proxy_pass http://$upstream_backend:5555;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        location /ws/view {
            proxy_pass http://$upstream_view_server:8000;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        location /ws/game/0 {
            proxy_pass http://$upstream_game_server:8000;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        location / {
            proxy_pass http://$upstream_game_client:443;
            proxy_set_header Host $host;
        }
    }

    # ----------------------------------------------------------------
    # market.metacube.games — NFT marketplace
    # ----------------------------------------------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name market.metacube.games;

        if ($cloudflare_ip = 0) { return 403; }

        ssl_certificate     /certs/metacube.pem;
        ssl_certificate_key /certs/metacube.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        proxy_http_version 1.1;
        add_header Access-Control-Allow-Origin https://market.metacube.games always;

        set $upstream_market market;

        location / {
            proxy_pass http://$upstream_market:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
        }
    }

    # ----------------------------------------------------------------
    # link.metacube.games — wallet-linking page
    # ----------------------------------------------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name link.metacube.games;

        if ($cloudflare_ip = 0) { return 403; }

        ssl_certificate     /certs/metacube.pem;
        ssl_certificate_key /certs/metacube.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        proxy_http_version 1.1;

        set $upstream_link_wallet link-wallet;

        location / {
            proxy_pass http://$upstream_link_wallet:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
        }
    }

    # ----------------------------------------------------------------
    # *.metacube.games catch-all → redirect to play
    # ----------------------------------------------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name *.metacube.games;

        if ($cloudflare_ip = 0) { return 403; }

        ssl_certificate     /certs/metacube.pem;
        ssl_certificate_key /certs/metacube.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        return 301 https://play.metacube.games$request_uri;
    }

    # ----------------------------------------------------------------
    # felts.xyz — static NFT assets at /a/..., empty root
    # ----------------------------------------------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name felts.xyz;

        if ($cloudflare_ip = 0) { return 403; }

        ssl_certificate     /certs/felts.pem;
        ssl_certificate_key /certs/felts.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            root /assets;
            try_files $uri =404;
            autoindex off;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Vary Origin always;
        }
    }

    # ----------------------------------------------------------------
    # indexer.felts.xyz — NFT indexer API
    # ----------------------------------------------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name indexer.felts.xyz;

        if ($cloudflare_ip = 0) { return 403; }

        ssl_certificate     /certs/felts.pem;
        ssl_certificate_key /certs/felts.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        proxy_http_version 1.1;
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Vary Origin always;

        location / {
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_pass http://indexer:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # ----------------------------------------------------------------
    # signatures.felts.xyz — Starknet signature playground
    # ----------------------------------------------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name signatures.felts.xyz;

        if ($cloudflare_ip = 0) { return 403; }

        ssl_certificate     /certs/felts.pem;
        ssl_certificate_key /certs/felts.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        proxy_http_version 1.1;

        set $upstream_signatures signatures;

        location / {
            proxy_pass http://$upstream_signatures:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
