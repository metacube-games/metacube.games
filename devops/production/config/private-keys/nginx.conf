# Internal-only nginx serving two private key files.
# This container has NO ports: directive — it is only reachable from
# other containers on prod-network (e.g. http://private-keys:8080/v1-private-key).
pid /tmp/nginx.pid;
worker_processes 1;

events {
    worker_connections 64;
}

http {
    server_tokens off;

    # Non-root worker can't write to /var/cache/nginx — point all temp
    # paths at /tmp instead.
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    server {
        listen 8080;
        server_name _;

        location = /v1-private-key {
            alias /data/v1-private-key;
            default_type text/plain;
        }

        location = /claim-key {
            alias /data/claim-key;
            default_type text/plain;
        }

        location / {
            return 403;
        }
    }
}
